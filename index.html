<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GADANA - Sliding Puzzle</title>
  <style>
    /* Imported Albert Sans and Manjari along with the existing fonts */
    @import url('https://fonts.googleapis.com/css2?family=Albert+Sans:wght@400;700&family=Gayathri:wght@400;700&family=Manjari:wght@700&family=Playfair+Display:wght@400;700;900&family=Crimson+Text:ital@0;1&display=swap');

    /* CUSTOM FONT DEFINITION */
    @font-face {
      font-family: 'ML_TT_Chithira';
      src: url('path/to/ML_TT_Chithira.ttf') format('truetype');
      font-display: swap;
    }

    /* BASE THEME (Light Mode Defaults) */
    :root {
      --color-background-primary: #f5f1eb;
      --color-text-primary: #1a1a1a;
      --color-text-secondary: #555555;
      --color-text-tertiary: #888888;
      --color-border-secondary: #ccc8be;
      --board-bg: #e8e3d6; 
      --board-frame: #1a1a1a;
      --tile-empty-bg: #dfd9cb; 
      --board-shadow: 8px 8px 0 #555555;
      --btn-hover-bg: #1a1a1a;
      --btn-hover-text: #f5f1eb;
      --overlay-bg: rgba(245, 241, 235, 0.4);
      --overlay-border: #1a1a1a;
      --tile-text-color: rgba(255, 255, 255, 0.9);
      --tile-text-bg: rgba(0, 0, 0, 0.6);
      
      /* Dynamic Grid Variable */
      --grid-size: 4;

      --lineart-img: url('Gemini_Generated_Image_hebcjshebcjshebc (1).png');
      --shaded-img: url('Gemini_Generated_Image_f38jokf38jokf38j.png');
    }

    /* DARK MODE VARIATION */
    [data-theme="dark"] {
      --color-background-primary: #1c1c1c;
      --color-text-primary: #e5dfd5;
      --color-text-secondary: #b5b0a5;
      --color-text-tertiary: #ddcd95; 
      --color-border-secondary: #444444;
      --board-bg: #ddcd95; 
      --board-frame: #ddcd95; 
      --tile-empty-bg: #1c1c1c;
      --board-shadow: 0 15px 35px rgba(0, 0, 0, 0.6);
      --btn-hover-bg: #ddcd95;
      --btn-hover-text: #1c1c1c;
      --overlay-bg: rgba(28, 28, 28, 0.4);
      --overlay-border: #ddcd95;
      --tile-text-color: #1c1c1c;
      --tile-text-bg: #ddcd95; 
    }

    *, *::before, *::after {
      box-sizing: border-box;
    }

    body {
      background-color: var(--color-background-primary);
      margin: 0;
      padding: 0;
      transition: background-color 0.3s ease;
      overflow-x: hidden;
    }

    .header-controls {
      width: 100%;
      max-width: 420px;
      display: flex;
      justify-content: flex-end;
      align-items: center;
      gap: 10px;
      margin-bottom: -10px;
    }

    .lang-toggle-btn {
      background: transparent;
      border: 1px solid var(--color-text-secondary);
      color: var(--color-text-primary);
      font-family: 'Playfair Display', Georgia, serif;
      font-size: 11px;
      font-weight: bold;
      padding: 5px 10px;
      border-radius: 12px;
      cursor: pointer;
      transition: all 0.2s ease;
    }
    .lang-toggle-btn:hover {
      border-color: var(--color-text-primary);
      transform: scale(1.03);
    }

    .theme-toggle-btn {
      background: transparent;
      border: 1px solid var(--color-text-secondary);
      color: var(--color-text-primary);
      width: 34px;
      height: 34px;
      border-radius: 50%;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      line-height: 1;
      transition: all 0.2s ease;
    }
    .theme-toggle-btn:hover {
      border-color: var(--color-text-primary);
      transform: scale(1.05);
    }

    .game-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 1rem 1rem 2.5rem;
      font-family: 'Crimson Text', Georgia, serif;
      color: var(--color-text-primary);
    }
    
    .game-title {
      font-family: 'Albert Sans', sans-serif;
      font-weight: 700;
      font-size: 32px;
      letter-spacing: 0.05em;
      margin: 0 0 2px;
      color: var(--color-text-primary);
      transition: font-family 0.15s ease;
    }
    /* Changes title font family to Manjari Bold when Malayalam layout is triggered */
    .game-title.lang-ml {
      font-family: 'Manjari', sans-serif;
      font-weight: 700;
    }

    [data-theme="dark"] .game-title {
      color: var(--color-text-tertiary);
    }
    .game-subtitle {
      font-family: 'Gayathri', 'Crimson Text', Georgia, serif;
      font-size: 15px;
      font-style: italic;
      color: var(--color-text-secondary);
      margin: 0 0 4px;
    }
    .level-indicator {
      font-family: 'Gayathri', 'Playfair Display', Georgia, serif;
      font-size: 14px;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      font-weight: 700;
      color: var(--text-tertiary);
      margin-bottom: 1.25rem;
    }
    [data-theme="light"] .level-indicator {
      color: #766e5f;
    }

    .stats-row {
      display: flex;
      gap: 32px;
      margin-bottom: 1.25rem;
    }
    .stat {
      text-align: center;
    }
    .stat-label {
      font-size: 11px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--color-text-secondary);
    }
    .stat-value {
      font-family: 'Playfair Display', Georgia, serif;
      font-size: 24px;
      font-weight: 700;
      color: var(--color-text-primary);
      line-height: 1.2;
    }
    [data-theme="dark"] .stat-value {
      color: var(--color-text-tertiary);
    }
    
    .board-frame-anchor {
      width: 412px;
      height: 412px;
      position: relative;
      margin-bottom: 8px;
      overflow: hidden; 
      border-radius: 8px;
    }

    .board-container {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      perspective: 1200px;
    }
    
    .board {
      display: grid;
      grid-template-columns: repeat(var(--grid-size), 1fr);
      gap: 3px;
      background: var(--board-bg);
      border: 3px solid var(--board-frame);
      border-radius: 6px;
      padding: 3px;
      box-shadow: var(--board-shadow);
      transform-origin: 25% 45%; 
      transition: transform 0.3s ease, box-shadow 0.3s ease, background 0.3s ease, border-color 0.3s ease;
      width: 400px;
      height: 400px;
      box-sizing: border-box;
    }

    .board.zoom-transitioning {
      animation: cameraZoomInForward 1.4s cubic-bezier(0.7, 0, 0.3, 1) forwards;
    }

    @keyframes cameraZoomInForward {
      0% { transform: scale(1) translateZ(0); opacity: 1; filter: blur(0px); }
      45% { filter: blur(1px); }
      85% { opacity: 0; }
      100% { transform: scale(3.5) translateZ(150px); opacity: 0; filter: blur(8px); }
    }

    .board.level-entrance-fade {
      animation: levelEntrancePlay 0.8s cubic-bezier(0.25, 1, 0.5, 1) forwards;
    }

    @keyframes levelEntrancePlay {
      from { opacity: 0; transform: scale(0.92); filter: blur(4px); }
      to { opacity: 1; transform: scale(1); filter: blur(0px); }
    }

    .tile {
      width: 100%;
      height: 100%;
      cursor: pointer;
      position: relative;
      overflow: hidden;
      transition: transform 0.12s ease, opacity 0.12s ease;
      border-radius: 2px;
      background-color: var(--color-background-primary);
    }
    .tile:hover:not(.empty) { transform: scale(0.97); }
    .tile:active:not(.empty) { transform: scale(0.94); }
    
    .tile.empty {
      background: var(--tile-empty-bg) !important;
      cursor: default;
    }
    .tile.empty::before, .tile.empty::after {
      display: none !important;
    }

    .tile::before {
      content: '';
      position: absolute;
      inset: 0;
      background-image: var(--lineart-img);
      background-repeat: no-repeat;
      background-size: 400px 400px;
      background-position: inherit;
      background-blend-mode: multiply;
      background-color: var(--color-background-primary);
      transition: background-color 0.3s ease, filter 0.3s ease;
      z-index: 1;
    }

    [data-theme="dark"] .tile::before {
      background-color: #ffffff;
      background-blend-mode: normal;
      filter: invert(1) sepia(0.3) saturate(2.5) hue-rotate(10deg) brightness(0.95) contrast(1.1);
    }

    .tile.final-revealed-tile::before {
      opacity: 0;
      animation: revealFinalMonochrome 1.2s cubic-bezier(0.4, 0, 0.2, 1) forwards;
    }
    @keyframes revealFinalMonochrome {
      to { opacity: 1; }
    }

    .tile::after {
      content: '';
      position: absolute;
      inset: 0;
      background-image: var(--shaded-img);
      background-repeat: no-repeat;
      background-size: 400px 400px;
      background-position: inherit;
      background-blend-mode: multiply;
      background-color: var(--color-background-primary);
      opacity: 0;
      transition: opacity 1.4s cubic-bezier(0.4, 0, 0.2, 1);
      pointer-events: none;
      z-index: 2;
    }

    .board.is-won .tile::after {
      opacity: 1;
      transition-delay: 1.2s; 
    }

    [data-theme="dark"] .board.is-won .tile::after {
      background-color: #1c1c1c;
      background-blend-mode: screen;
      filter: invert(1) sepia(0.5) saturate(2.2) hue-rotate(15deg) brightness(1.1) contrast(1.2);
    }

    .tile-number {
      position: absolute;
      bottom: 5px;
      right: 7px;
      font-family: 'Playfair Display', Georgia, serif;
      font-size: 11px;
      font-weight: 700;
      color: var(--tile-text-color);
      background: var(--tile-text-bg);
      padding: 2px 5px;
      border-radius: 3px;
      pointer-events: none;
      line-height: 1;
      z-index: 3;
      transition: color 0.3s ease, background 0.3s ease;
    }

    .hint-arrow {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 10;
      pointer-events: none;
      animation: pulseArrow 1s ease-in-out infinite;
    }

    .hint-arrow svg {
      width: 36px;
      height: 36px;
      filter: drop-shadow(2px 2px 0px rgba(245,241,235,0.9));
    }

    [data-theme="dark"] .hint-arrow svg {
      filter: drop-shadow(2px 2px 0px rgba(28,28,28,0.9));
    }

    @keyframes pulseArrow {
      0%, 100% { opacity: 0.6; transform: scale(0.94); }
      50% { opacity: 1; transform: scale(1); }
    }

    .board.hint-active .tile:not(.hint-target) {
      opacity: 0.45;
      transition: opacity 0.25s ease;
    }

    .tile.hint-target {
      opacity: 1 !important;
      transition: opacity 0.25s ease;
    }

    .ghost-move-up { animation: ghostUp 1s ease; }
    .ghost-move-down { animation: ghostDown 1s ease; }
    .ghost-move-left { animation: ghostLeft 1s ease; }
    .ghost-move-right { animation: ghostRight 1s ease; }

    @keyframes ghostUp { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-20%); } }
    @keyframes ghostDown { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(20%); } }
    @keyframes ghostLeft { 0%, 100% { transform: translateX(0); } 50% { transform: translateX(-20%); } }
    @keyframes ghostRight { 0%, 100% { transform: translateX(0); } 50% { transform: translateX(20%); } }

    .controls {
      display: flex;
      gap: 14px;
      margin-top: 1.5rem;
    }
    .btn {
      font-family: 'Gayathri', 'Crimson Text', Georgia, serif;
      font-size: 15px;
      letter-spacing: 0.03em;
      padding: 8px 24px;
      border: 1px solid var(--color-text-primary);
      background: transparent;
      color: var(--color-text-primary);
      cursor: pointer;
      border-radius: 20px;
      font-weight: 700;
      transition: background 0.15s, color 0.15s, border-color 0.15s;
    }
    .btn:hover { 
      background: var(--btn-hover-bg); 
      color: var(--btn-hover-text);
      border-color: var(--btn-hover-bg);
    }
    .btn.primary {
      background: var(--color-text-primary);
      color: var(--color-background-primary);
      font-weight: bold;
      z-index: 12;
    }
    [data-theme="dark"] .btn.primary {
      background: var(--color-text-tertiary);
      color: #1c1c1c;
      border-color: var(--color-text-tertiary);
    }
    .btn.primary:hover { opacity: 0.9; }
    
    .win-overlay {
      display: none;
      position: absolute;
      inset: -10px;
      background: var(--overlay-bg);
      flex-direction: column;
      align-items: center;
      justify-content: center;
      border-radius: 8px;
      z-index: 10;
    }
    .win-overlay.show { display: flex; }
    
    .win-box {
      background: var(--color-background-primary);
      padding: 22px 45px;
      border-radius: 8px;
      border: 2px solid var(--overlay-border);
      text-align: center;
      z-index: 12;
      box-shadow: 0 15px 35px rgba(0,0,0,0.35);
    }

    .win-title {
      font-family: 'Gayathri', 'Playfair Display', Georgia, serif;
      font-size: 34px;
      font-weight: 700;
      color: var(--color-text-primary);
      margin-bottom: 4px;
    }
    [data-theme="dark"] .win-title { color: var(--color-text-tertiary); }
    
    .win-sub {
      font-style: italic;
      color: var(--color-text-secondary);
      font-size: 16px;
      margin-bottom: 12px;
    }

    .win-stars {
      display: flex;
      justify-content: center;
      gap: 6px;
      margin-bottom: 10px;
    }

    .win-star {
      font-size: 26px;
      line-height: 1;
      opacity: 0;
      transform: scale(0.4) rotate(-20deg);
      transition: opacity 0.35s ease, transform 0.35s cubic-bezier(0.34,1.56,0.64,1);
    }

    .win-star.lit {
      opacity: 1;
      transform: scale(1) rotate(0deg);
    }

    .win-star.dim {
      opacity: 0.2;
      transform: scale(1) rotate(0deg);
    }

    .win-efficiency {
      font-family: 'Playfair Display', Georgia, serif;
      font-size: 13px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--color-text-tertiary);
      margin-bottom: 16px;
    }

    [data-theme="dark"] .win-efficiency {
      color: var(--color-text-tertiary);
    }
    #animationCanvas {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 11;
    }

    .difficulty-row {
      display: flex;
      gap: 8px;
      margin-bottom: 1.2rem;
    }
    .diff-btn {
      font-family: 'Gayathri', 'Crimson Text', Georgia, serif;
      font-size: 13px;
      font-weight: bold;
      padding: 4px 14px;
      border: 1px solid var(--color-border-secondary);
      background: transparent;
      color: var(--text-secondary);
      cursor: pointer;
      border-radius: 12px;
      transition: all 0.12s;
    }
    .diff-btn.active, .diff-btn:hover {
      border-color: var(--color-text-primary);
      color: var(--color-text-primary);
    }
    [data-theme="dark"] .diff-btn.active, [data-theme="dark"] .diff-btn:hover {
      border-color: var(--color-text-tertiary);
      color: var(--color-text-tertiary);
      background: rgba(221, 205, 149, 0.1);
    }
    .hint-text {
      font-family: 'Gayathri', sans-serif;
      font-size: 14px;
      font-style: italic;
      color: var(--color-text-secondary);
      margin-top: 0.75rem;
      min-height: 20px;
      opacity: 0;
      transition: opacity 0.4s ease-in-out;
    }
    .hint-text.visible { opacity: 1; }
    
    .hint-pips {
      display: flex;
      gap: 6px;
      align-items: center;
      justify-content: center;
      margin-top: 8px;
    }

    .hint-pip {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--color-text-primary);
      transition: background 0.25s ease, transform 0.25s ease;
    }

    .hint-pip.used {
      background: var(--color-border-secondary);
      transform: scale(0.7);
    }

    [data-theme="dark"] .hint-pip { background: var(--color-text-tertiary); }
    [data-theme="dark"] .hint-pip.used { background: #3a3a3a; transform: scale(0.7); }

    .btn.hint-exhausted {
      opacity: 0.35;
      cursor: not-allowed;
      pointer-events: none;
    }
    
    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      border: 0;
    }
  </style>
</head>
<body>

<div class="game-wrap">
  <div class="header-controls">
    <button class="theme-toggle-btn" id="musicToggle" onclick="toggleMusic()" title="Toggle Background Music" style="opacity: 0.5; margin-right: auto;">♫</button>
    <button class="lang-toggle-btn" id="langToggle" onclick="toggleLanguage()">മലയാളം</button>
    <button class="theme-toggle-btn" id="themeToggle" onclick="toggleTheme()" title="Switch View Mode">☀︎</button>
  </div>

  <h1 class="sr-only" id="srInstruction">Sliding puzzle game with illustrated tiles. Arrange tiles to complete the illustration.</h1>
  <p class="game-title" id="mainTitle">GADANA</p>
  <p class="game-subtitle" id="mainSubtitle">Reassemble the shattered illustration</p>
  <p class="level-indicator" id="levelIndicator">Level 1: The Village Square</p>

  <div class="stats-row">
    <div class="stat">
      <div class="stat-label">Moves</div>
      <div class="stat-value" id="moves">0</div>
    </div>
    <div class="stat">
      <div class="stat-label">Time</div>
      <div class="stat-value" id="timer">0:00</div>
    </div>
    <div class="stat">
      <div class="stat-label">Best</div>
      <div class="stat-value" id="best">—</div>
    </div>
  </div>

  <div class="difficulty-row">
    <button class="diff-btn active" id="diffEasy" onclick="setDifficulty(this,'easy')">Easy</button>
    <button class="diff-btn" id="diffMedium" onclick="setDifficulty(this,'medium')">Medium</button>
    <button class="diff-btn" id="diffHard" onclick="setDifficulty(this,'hard')">Hard</button>
  </div>

  <div class="board-frame-anchor">
    <div class="board-container">
      <div class="board" id="board"></div>
      <div class="win-overlay" id="winOverlay">
        <canvas id="animationCanvas"></canvas>
        <div class="win-box">
          <div class="win-title" id="winHeader">Solved!</div>
          <div class="win-sub" id="winStats"></div>
          <div class="win-stars" id="winStars">
            <span class="win-star" id="winStar0">★</span>
            <span class="win-star" id="winStar1">★</span>
            <span class="win-star" id="winStar2">★</span>
          </div>
          <div class="win-efficiency" id="winEfficiency"></div>
          <button class="btn primary" id="winActionButton" onclick="triggerLevelTransition()">Next Level</button>
        </div>
      </div>
    </div>
  </div>

  <div class="controls">
    <button class="btn" id="resetBtn" onclick="newGame()">Reset</button>
    <button class="btn" id="hintBtn" onclick="showHint()">Hint</button>
  </div>
  <div class="hint-pips" id="hintPips">
    <div class="hint-pip" id="hintPip0"></div>
    <div class="hint-pip" id="hintPip1"></div>
    <div class="hint-pip" id="hintPip2"></div>
    <div class="hint-pip" id="hintPip3"></div>
  </div>
  <p class="hint-text" id="hintText">Click tiles adjacent to the empty space to slide them.</p>
</div>

<script>
// --- AUDIO SETUP ---
const bgMusic = new Audio('Beside_the_Wooden_Well.mp3');
bgMusic.loop = true;
bgMusic.volume = 0.3;
let musicEnabled = false;

function toggleMusic() {
  const btn = document.getElementById('musicToggle');
  musicEnabled = !musicEnabled;
  if (musicEnabled) {
    bgMusic.play().catch(e => { console.log('Audio wait for user interaction'); });
    btn.style.opacity = '1';
  } else {
    bgMusic.pause();
    btn.style.opacity = '0.5';
  }
}

const tileSound1 = new Audio('freesound-community-11-carboard-box-folding-99720_S8HEVocg.mp3');
const tileSound2 = new Audio('freesound-community-11-carboard-box-folding-99720_9MQfpIBd.mp3');
const winSound = new Audio('mrstokes302-success-videogame-sfx-mrstokes302-423626_ykhT3sNw.mp3');

tileSound1.volume = 0.5;
tileSound2.volume = 0.5;
winSound.volume = 0.7;

function playMoveSound() {
  const snd = Math.random() < 0.5 ? tileSound1 : tileSound2;
  snd.currentTime = 0;
  snd.play().catch(e => { console.log('Audio wait for user interaction'); });
}

function playWinSound() {
  winSound.currentTime = 0;
  winSound.play().catch(e => { console.log('Audio wait for user interaction'); });
}

let SIZE = 4;
let TILE_COUNT = SIZE * SIZE;
let tiles = [];
let moves = 0;
let seconds = 0;
let timerInterval = null;
let timerStarted = false;
let difficulty = 'easy';
let bestMoves = {};
let currentTheme = 'light';
let isGameWon = false;
let currentLang = 'en'; 

let lastMovedTileValue = -1; 
let currentLevelIndex = 0;
let hintsRemaining = 4;

const gameLevels = [
  { names: { en: "Level 1: The Village Square", ml: "ഘട്ടം 1: ഗ്രാമത്തിലെ കവല" }, lineart: "Gemini_Generated_Image_hebcjshebcjshebc (1).png", shaded: "Gemini_Generated_Image_f38jokf38jokf38j.png" },

    document.getElementById('winEfficiency').textContent =
      `${pack.efficiencyLabel}: ${eff}%`;
    actionBtn.textContent = currentLevelIndex < gameLevels.length - 1 ? pack.nextLevel : pack.restartJourney;
  } else {
    document.getElementById('hintText').textContent = pack.startComment;
  }
}

function toggleTheme() {
  const root = document.documentElement;
  const toggleBtn = document.getElementById('themeToggle');
  const pack = localizations[currentLang];
  if (root.getAttribute('data-theme') === 'dark') {
    root.removeAttribute('data-theme');
    toggleBtn.textContent = '☀︎'; toggleBtn.setAttribute('title', pack.themeTip); currentTheme = 'light';
  } else {
    root.setAttribute('data-theme', 'dark');
    toggleBtn.textContent = '☾︎'; toggleBtn.setAttribute('title', pack.themeTip); currentTheme = 'dark';
  }
  renderBoard();
}

function initTiles() { tiles = Array.from({length: TILE_COUNT}, (_, i) => i); lastMovedTileValue = -1; }

function shuffle(arr, shuffleMoves) {
  let emptyPos = TILE_COUNT - 1;
  for (let i = 0; i < shuffleMoves; i++) {
    const neighbors = getNeighbors(emptyPos);
    const pick = neighbors[Math.floor(Math.random() * neighbors.length)];
    [arr[emptyPos], arr[pick]] = [arr[pick], arr[emptyPos]];
    emptyPos = pick;
  }
  return arr;
}

function getNeighbors(pos) {
  const r = Math.floor(pos / SIZE), c = pos % SIZE, neighbors = [];
  if (r > 0) neighbors.push(pos - SIZE);
  if (r < SIZE - 1) neighbors.push(pos + SIZE);
  if (c > 0) neighbors.push(pos - 1);
  if (c < SIZE - 1) neighbors.push(pos + 1);
  return neighbors;
}

function getEmptyPos() { return tiles.indexOf(TILE_COUNT - 1); }
function canMove(pos) { return getNeighbors(getEmptyPos()).includes(pos); }

function calculateBoardScore() {
  let score = 0;
  for (let i = 0; i < TILE_COUNT; i++) {
    let val = tiles[i];
    if (val === TILE_COUNT - 1) continue; 
    let currentX = i % SIZE;
    let currentY = Math.floor(i / SIZE);
    let targetX = val % SIZE;
    let targetY = Math.floor(val / SIZE);
    score += Math.abs(currentX - targetX) + Math.abs(currentY - targetY);
  }
  return score;
}

let idleTimeout = null;
let commentFadeTimeout = null;
const moveThresholds = { easy: 60, medium: 250, hard: 600 };

function showDynamicComment(text, autoFade = true) {
  const el = document.getElementById('hintText');
  if (commentFadeTimeout) clearTimeout(commentFadeTimeout);
  el.classList.remove('visible');
  setTimeout(() => {
    el.textContent = text;
    el.classList.add('visible');
    if (autoFade) commentFadeTimeout = setTimeout(() => { el.classList.remove('visible'); }, 4000);
  }, el.classList.contains('visible') ? 200 : 0);
}

function resetIdleTimer() {
  if (idleTimeout) clearTimeout(idleTimeout);
  if (isGameWon) return;
  const pack = localizations[currentLang];
  idleTimeout = setTimeout(() => {
    const randomIdx = Math.floor(Math.random() * pack.idle.length);
    showDynamicComment(pack.idle[randomIdx], false);
  }, 12000); 
}

function moveTile(pos) {
  if (isGameWon) return;
  const pack = localizations[currentLang];

  if (!canMove(pos)) {
     const randomIdx = Math.floor(Math.random() * pack.invalid.length);
     showDynamicComment(pack.invalid[randomIdx], true);
     return;
  }
  
  playMoveSound();
  if (!timerStarted) startTimer();
  
  const preMoveScore = calculateBoardScore();
  const emptyPos = getEmptyPos();
  const movedTileValue = tiles[pos];

  [tiles[emptyPos], tiles[pos]] = [tiles[pos], tiles[emptyPos]];
  moves++;
  document.getElementById('moves').textContent = moves;
  
  if (checkWin()) {
    handleWin();
  } else {
    const postMoveScore = calculateBoardScore();
    let commentBank = null;

    if (moves > moveThresholds[difficulty] && Math.random() < 0.2) {
      commentBank = pack.struggle; 
    } else if (movedTileValue === lastMovedTileValue) {
      commentBank = pack.undoing; 
    } else if (postMoveScore < preMoveScore) {
      if (Math.random() < 0.35) commentBank = pack.improving; 
    } else if (postMoveScore > preMoveScore) {
      if (Math.random() < 0.4) commentBank = pack.worsening; 
    }

    if (commentBank) {
      const randomIdx = Math.floor(Math.random() * commentBank.length);
      showDynamicComment(commentBank[randomIdx], true);
    }
    
    lastMovedTileValue = movedTileValue;
    renderBoard();
    resetIdleTimer();
  }
}

function checkWin() { return tiles.every((v, i) => v === i); }

// Optimal move baselines per difficulty (generous but meaningful)
const optimalMovesBase = { easy: 30, medium: 80, hard: 200 };

function computeEfficiency(actualMoves, difficulty) {
  const base = optimalMovesBase[difficulty];
  // efficiency = base / actual, capped at 100%
  return Math.min(100, Math.round((base / actualMoves) * 100));
}

function computeStars(efficiency, seconds, difficulty) {
  // Time thresholds per difficulty
  const timeLimits = { easy: [60, 120], medium: [180, 360], hard: [480, 900] };
  const [fast, medium] = timeLimits[difficulty];
  let stars = 0;
  if (efficiency >= 80) stars = 3;
  else if (efficiency >= 55) stars = 2;
  else stars = 1;
  // Dock a star if time was really slow (but never below 1)
  if (seconds > medium && stars > 1) stars--;
  return stars;
}

function animateStars(starCount) {
  for (let i = 0; i < 3; i++) {
    const el = document.getElementById('winStar' + i);
    el.classList.remove('lit', 'dim');
    // reset
    void el.offsetWidth;
  }
  for (let i = 0; i < 3; i++) {
    const el = document.getElementById('winStar' + i);
    setTimeout(() => {
      el.classList.add(i < starCount ? 'lit' : 'dim');
    }, 200 + i * 180);
  }
}

function handleWin() {
  clearInterval(timerInterval); timerStarted = false; isGameWon = true;
  if (idleTimeout) clearTimeout(idleTimeout);
  playWinSound();
  
  const recordKey = `${currentLevelIndex}_${difficulty}`;
  if (!bestMoves[recordKey] || moves < bestMoves[recordKey]) bestMoves[recordKey] = moves;
  updateBestScoreDisplay();
  document.getElementById('winStats').textContent = `${moves} moves · ${document.getElementById('timer').textContent}`;

  const efficiency = computeEfficiency(moves, difficulty);
  const starCount = computeStars(efficiency, seconds, difficulty);

  document.getElementById('winEfficiency').textContent =
    `${localizations[currentLang].efficiencyLabel}: ${efficiency}%`;

  const actionBtn = document.getElementById('winActionButton');
  const pack = localizations[currentLang];

  // Pick header and comment based on star rating (overrides old difficulty-only logic)
  let header, commentBank;
  if (starCount === 3) {
    header = pack.winHeaderHard; // reuse the "epic" header
    commentBank = pack.stars3Comments;
  } else if (starCount === 2) {
    header = pack.winHeaderMedium;
    commentBank = pack.stars2Comments;
  } else {
    header = pack.winHeaderEasy;
    commentBank = pack.stars1Comments;
  }
  document.getElementById('winHeader').textContent = header;
  showDynamicComment(commentBank[Math.floor(Math.random() * commentBank.length)], false);

  actionBtn.textContent = currentLevelIndex < gameLevels.length - 1 ? pack.nextLevel : pack.restartJourney;
  renderBoard();
  setTimeout(() => {
    document.getElementById('winOverlay').classList.add('show');
    startCelebration();
    animateStars(starCount);
  }, 2600);
}

function triggerLevelTransition() {
  const board = document.getElementById('board');
  const winOverlay = document.getElementById('winOverlay');
  stopCelebration(); winOverlay.classList.remove('show');
  board.classList.add('zoom-transitioning');
  setTimeout(() => {
    currentLevelIndex = currentLevelIndex < gameLevels.length - 1 ? currentLevelIndex + 1 : 0;
    newGame();
    board.classList.remove('zoom-transitioning');
    board.classList.add('level-entrance-fade');
    setTimeout(() => { board.classList.remove('level-entrance-fade'); }, 800);
  }, 1100); 
}

function updateBestScoreDisplay() {
  const bk = bestMoves[`${currentLevelIndex}_${difficulty}`];
  document.getElementById('best').textContent = bk ? bk : '—';
}

function startCelebration() {
  canvas = document.getElementById('animationCanvas'); ctx = canvas.getContext('2d');
  canvas.width = canvas.parentNode.offsetWidth; canvas.height = canvas.parentNode.offsetHeight;
  particles = []; const colors = themeConfetti[currentTheme];
  for (let i = 0; i < 80; i++) {
    const angle = Math.random() * Math.PI * 2; const speed = Math.random() * 6 + 4;
    particles.push({
      x: canvas.width / 2, y: canvas.height / 2, vx: Math.cos(angle) * speed, vy: Math.sin(angle) * speed,
      size: Math.random() * 6 + 4, width: Math.random() * 8 + 4, height: Math.random() * 4 + 3,
      color: colors[Math.floor(Math.random() * colors.length)], rotation: Math.random() * Math.PI,
      rotationSpeed: (Math.random() - 0.5) * 0.2, gravity: 0.15, friction: 0.98, opacity: 1, fade: Math.random() * 0.008 + 0.006,
      shape: Math.random() > 0.4 ? 'rectangle' : 'circle'
    });
  }
  animateParticles();
}

function animateParticles() {
  ctx.clearRect(0, 0, canvas.width, canvas.height); let activeParticles = false;
  particles.forEach(p => {
    if (p.opacity <= 0) return;
    activeParticles = true;
    p.vx *= p.friction; p.vy *= p.friction; p.vy += p.gravity;
    p.x += p.vx; p.y += p.vy; p.rotation += p.rotationSpeed; p.opacity -= p.fade;
    ctx.save(); ctx.translate(p.x, p.y); ctx.rotate(p.rotation); ctx.globalAlpha = Math.max(0, p.opacity); ctx.fillStyle = p.color;
    ctx.beginPath();
    if (p.shape === 'rectangle') { ctx.fillRect(-p.width / 2, -p.height / 2, p.width, p.height); } else { ctx.arc(0, 0, p.size / 2, 0, Math.PI * 2); ctx.fill(); }
    ctx.restore();
  });
  if (activeParticles) animationFrameId = requestAnimationFrame(animateParticles);
}

function stopCelebration() {
  if (animationFrameId) cancelAnimationFrame(animationFrameId);
  if (ctx && canvas) ctx.clearRect(0, 0, canvas.width, canvas.height);
}

function startTimer() {
  timerStarted = true;
  timerInterval = setInterval(() => {
    seconds++;
    document.getElementById('timer').textContent = `${Math.floor(seconds / 60)}:${(seconds % 60).toString().padStart(2,'0')}`;
  }, 1000);
}

function newGame() {
  clearInterval(timerInterval); if (idleTimeout) clearTimeout(idleTimeout); if (commentFadeTimeout) clearTimeout(commentFadeTimeout);
  stopCelebration(); timerStarted = false; isGameWon = false; moves = 0; seconds = 0;
  document.getElementById('moves').textContent = '0'; document.getElementById('timer').textContent = '0:00';
  
  const activeLevel = gameLevels[currentLevelIndex];
  document.getElementById('levelIndicator').textContent = activeLevel.names[currentLang];
  const root = document.documentElement;
  root.style.setProperty('--lineart-img', `url('${activeLevel.lineart}')`); root.style.setProperty('--shaded-img', `url('${activeLevel.shaded}')`);
  
  const boardEl = document.getElementById('board'); boardEl.classList.remove('is-won');
  document.getElementById('winOverlay').classList.remove('show');
  
  const hintEl = document.getElementById('hintText'); hintEl.classList.remove('visible');
  hintEl.textContent = localizations[currentLang].startComment; hintEl.classList.add('visible');
  
  hintsRemaining = 4; updateHintUI();
  const shuffleMoves = difficulty === 'easy' ? 40 : difficulty === 'medium' ? 120 : 300;
  initTiles(); shuffle(tiles, shuffleMoves); renderBoard(); updateBestScoreDisplay(); resetIdleTimer();
}

function renderBoard() {
  const board = document.getElementById('board'); board.innerHTML = '';
  if (isGameWon) board.classList.add('is-won'); else board.classList.remove('is-won');
  
  tiles.forEach((tileVal, pos) => {
    const div = document.createElement('div');
    if (tileVal === TILE_COUNT - 1 && !isGameWon) {
      div.className = 'tile empty';
    } else {
      div.className = 'tile';
      if (tileVal === TILE_COUNT - 1 && isGameWon) div.classList.add('final-revealed-tile');
      const pctX = ((tileVal % SIZE) / (SIZE - 1)) * 100, pctY = (Math.floor(tileVal / SIZE) / (SIZE - 1)) * 100;
      div.style.backgroundPosition = `${pctX}% ${pctY}%`;
      
      if (!isGameWon) {
        const num = document.createElement('span'); num.className = 'tile-number';
        if(SIZE > 4) { num.style.fontSize = '9px'; num.style.padding = '1px 3px'; }
        num.textContent = tileVal + 1; div.appendChild(num);
        if (canMove(pos)) div.style.cursor = 'pointer';
        div.onclick = () => moveTile(pos);
      }
    }
    board.appendChild(div);
  });
}

// Manhattan distance heuristic for entire board state
function hintHeuristic(state, size) {
  let score = 0;
  const total = size * size;
  for (let i = 0; i < total; i++) {
    const val = state[i];
    if (val === total - 1) continue; // skip blank tile
    score += Math.abs(Math.floor(i / size) - Math.floor(val / size))
           + Math.abs((i % size) - (val % size));
  }
  return score;
}

// Beam search: explore the puzzle space with a wide beam, track the best
// path seen so far. Returns an array of {tilePos, emptyPos} for up to 3 moves.
function getNextHintMoves() {
  const MOVES_WANTED = 3;
  const BEAM_WIDTH = 80;      // candidates kept per depth level
  const MAX_DEPTH = 25;       // look this many moves ahead to find a good direction

  const startEmpty = tiles.indexOf(TILE_COUNT - 1);

  // node = { state: Int8Array, emptyPos, path: [{tilePos,emptyPos}], h }
  const makeNode = (state, emptyPos, path) => ({
    state,
    emptyPos,
    path,
    h: hintHeuristic(state, SIZE)
  });

  let beam = [makeNode(new Int8Array(tiles), startEmpty, [])];
  const visited = new Set([tiles.join(',')]);

  let bestNode = beam[0]; // track the node with lowest h seen

  for (let depth = 0; depth < MAX_DEPTH; depth++) {
    const nextCandidates = [];

    for (const node of beam) {
      const nbrs = getNeighbors(node.emptyPos);
      for (const n of nbrs) {
        const newState = node.state.slice();
        newState[node.emptyPos] = newState[n];
        newState[n] = TILE_COUNT - 1;

        const key = Array.from(newState).join(',');
        if (visited.has(key)) continue;
        visited.add(key);

        const newPath = [...node.path, { tilePos: n, emptyPos: node.emptyPos }];
        const child = makeNode(newState, n, newPath);
        nextCandidates.push(child);

        if (child.h < bestNode.h) bestNode = child;
        if (child.h === 0) {
          // Solved! Return first 3 steps
          return child.path.slice(0, MOVES_WANTED);
        }
      }
    }

    if (nextCandidates.length === 0) break;

    // Keep the BEAM_WIDTH best candidates by heuristic
    nextCandidates.sort((a, b) => a.h - b.h);
    beam = nextCandidates.slice(0, BEAM_WIDTH);
  }

  // Return the first MOVES_WANTED steps from the best path found
  return bestNode.path.slice(0, MOVES_WANTED);
}

function updateHintUI() {
  const btn = document.getElementById('hintBtn');
  for (let i = 0; i < 4; i++) {
    const pip = document.getElementById('hintPip' + i);
    if (pip) pip.classList.toggle('used', i >= hintsRemaining);
  }
  if (hintsRemaining === 0) {
    btn.classList.add('hint-exhausted');
  } else {
    btn.classList.remove('hint-exhausted');
  }
}

function showHint() {
  if (isGameWon) return;

  if (hintsRemaining <= 0) {
    showDynamicComment(localizations[currentLang].hintExhausted, true);
    return;
  }

  const moves = getNextHintMoves();
  if (!moves || moves.length === 0) return;

  hintsRemaining--;
  updateHintUI();

  // Animate each move sequentially, staggered 1.1s apart
  moves.forEach(({ tilePos, emptyPos }, idx) => {
    setTimeout(() => {
      const boardTiles = document.getElementById('board').querySelectorAll('.tile');
      const hintTile = boardTiles[tilePos];
      if (!hintTile) return;

      // Direction: the tile at tilePos slides into emptyPos
      let rotateDeg = 0, animClass = '';
      if (tilePos === emptyPos - 1)        { rotateDeg = 90;  animClass = 'ghost-move-right'; }
      else if (tilePos === emptyPos + 1)   { rotateDeg = -90; animClass = 'ghost-move-left'; }
      else if (tilePos === emptyPos - SIZE) { rotateDeg = 180; animClass = 'ghost-move-down'; }
      else if (tilePos === emptyPos + SIZE) { rotateDeg = 0;   animClass = 'ghost-move-up'; }

      const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
      const arrowStroke = isDark ? '#ddcd95' : '#1a1a1a';

      const arrow = document.createElement('div');
      arrow.className = 'hint-arrow';
      arrow.innerHTML = `<svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" style="transform:rotate(${rotateDeg}deg)">
        <line x1="12" y1="20" x2="12" y2="5" stroke="${arrowStroke}" stroke-width="1.8" stroke-linecap="round"/>
        <polyline points="6,11 12,5 18,11" fill="none" stroke="${arrowStroke}" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>`;

      const board = document.getElementById('board');
      board.classList.add('hint-active');
      hintTile.classList.add('hint-target');
      hintTile.appendChild(arrow);
      hintTile.classList.add(animClass);

      setTimeout(() => {
        if (hintTile.contains(arrow)) hintTile.removeChild(arrow);
        hintTile.classList.remove(animClass, 'hint-target');
        board.classList.remove('hint-active');
      }, 950);
    }, idx * 1100);
  });

  showDynamicComment(localizations[currentLang].hintComment, true);
  resetIdleTimer();
}

function setDifficulty(btn, d) {
  difficulty = d; document.querySelectorAll('.diff-btn').forEach(b => b.classList.remove('active')); btn.classList.add('active');
  if (difficulty === 'easy') SIZE = 4; else if (difficulty === 'medium') SIZE = 6; else if (difficulty === 'hard') SIZE = 8;
  TILE_COUNT = SIZE * SIZE; document.documentElement.style.setProperty('--grid-size', SIZE); newGame();
}

newGame();
</script>
